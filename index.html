<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Pomelia – Vacanze sostenibili in Sicilia</title>
  <link rel="stylesheet" href="ASSETS/CSS/style.css">
</head>

<body>
  <header class="header">
    <div class="logo">
      <img src="ASSETS/IMG/logopomelia.png" alt="Logo Hotel Pomelia">
    </div>

    <nav class="navbar">
      <ul>
        <li><a href="#">Chi siamo</a></li>
        <li><a href="#">Sostenibilità</a></li>
        <li><a href="#">I nostri servizi</a></li>
        <li><a href="#">Spiaggia</a></li>
      </ul>
    </nav>

    <div class="cta">
      <button class="btn-prenota">Prenota ora</button>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Hotel Pomelia</h1>
      <p>Quando il lusso incontra la sostenibilità</p>
      <br>
      <button class="btn-scopri">Contattaci</button>
    </div>
  </section>

  <section class="benefit">
    <div class="container">
      <h2>Società Benefit Certificata</h2>

      <div class="image-row">
        <div class="image-card">
          <img src="ASSETS/IMG/hotelinterni.png" alt="Interni lussuosi dell’Hotel Pomelia">
          <div class="overlay-text">Interni</div>
        </div>

        <div class="image-card">
          <img src="ASSETS/IMG/camera.png" alt="Camere dell’Hotel Pomelia">
          <div class="overlay-text">Le nostre camere</div>
        </div>

        <div class="image-card">
          <img src="ASSETS/IMG/spa.png" alt="Area spa e benessere dell’Hotel Pomelia">
          <div class="overlay-text">Spa &amp; benessere</div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-left">
        <p>&copy; 2026 Hotel Pomelia, Ragusa, Sicilia</p>
      </div>

      <div class="footer-right">
        <a href="#" target="_blank" class="social-icon">
          <img src="ASSETS/IMG/facebook.svg" alt="Facebook">
        </a>
        <a href="#" target="_blank" class="social-icon">
          <img src="ASSETS/IMG/instagram.svg" alt="Instagram">
        </a>
        <a href="#" target="_blank" class="social-icon">
          <img src="ASSETS/IMG/linkedin.svg" alt="LinkedIn">
        </a>
      </div>
    </div>
  </footer>
</body>
</html>
